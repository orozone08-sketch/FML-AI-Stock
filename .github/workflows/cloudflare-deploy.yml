name: Cloudflare production deploy
on:
  workflow_run:
    workflows: ['Cloudflare validation']
    types: [completed]
permissions:
  contents: read
concurrency:
  group: fastockflow-cloudflare-production
  cancel-in-progress: false
jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'cloudflare/serverless-migration'
    runs-on: ubuntu-latest
    environment: cloudflare-production
    defaults:
      run:
        working-directory: cloudflare
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      EXPECTED_D1_DATABASE_ID: ${{ secrets.FASTOCKFLOW_D1_DATABASE_ID }}
      HEALTHCHECK_URL: ${{ secrets.FASTOCKFLOW_WORKER_URL }}
      SMOKE_LOGIN_ID: ${{ secrets.FASTOCKFLOW_SMOKE_LOGIN_ID }}
      SMOKE_PASSWORD: ${{ secrets.FASTOCKFLOW_SMOKE_PASSWORD }}
      SMOKE_COMPANY_ID: ${{ secrets.FASTOCKFLOW_SMOKE_COMPANY_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare/package-lock.json
      - run: npm ci
      - name: Verify exact tested commit and production resource identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.workflow_run.head_sha }}"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$EXPECTED_D1_DATABASE_ID"
          test "$EXPECTED_D1_DATABASE_ID" != '00000000-0000-0000-0000-000000000000'
          grep -q '"name": "fastockflow"' wrangler.jsonc
          grep -q '"database_name": "fastockflow-db"' wrangler.jsonc
          grep -q '"bucket_name": "fastockflow-files"' wrangler.jsonc
          sed -i "s/00000000-0000-0000-0000-000000000000/$EXPECTED_D1_DATABASE_ID/" wrangler.jsonc
          npx wrangler whoami
          npx wrangler d1 info fastockflow-db --json | tee /tmp/d1-info.json
          grep -q "$EXPECTED_D1_DATABASE_ID" /tmp/d1-info.json
      - run: npm run validate
      - name: Record D1 recovery point
        run: npx wrangler d1 time-travel info fastockflow-db --json | tee /tmp/d1-recovery-point.json
      - name: Apply immutable migrations
        run: npx wrangler d1 migrations apply fastockflow-db --remote
      - name: Deploy tested Worker
        run: npx wrangler deploy --var "DEPLOY_COMMIT:${{ github.event.workflow_run.head_sha }}"
      - name: Public health and readiness checks
        shell: bash
        run: |
          set -euo pipefail
          test -n "$HEALTHCHECK_URL"
          curl --fail --retry 5 --retry-all-errors --max-time 15 "$HEALTHCHECK_URL/healthz" | tee /tmp/fastockflow-health.json
          node -e "const r=JSON.parse(require('node:fs').readFileSync('/tmp/fastockflow-health.json','utf8')); if(r.ok!==true||r.commit!=='${{ github.event.workflow_run.head_sha }}') process.exit(1)"
          curl --fail --retry 5 --retry-all-errors --max-time 15 "$HEALTHCHECK_URL/readyz"
      - name: Authenticated post-deploy acceptance checks
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SMOKE_LOGIN_ID"
          test -n "$SMOKE_PASSWORD"
          test -n "$SMOKE_COMPANY_ID"
          test "$SMOKE_COMPANY_ID" -gt 0

          cookie_jar="$(mktemp)"
          cleanup() {
            csrf="$(awk '$6 == "fastock_csrf" { print $7 }' "$cookie_jar" | tail -n 1)"
            if [ -n "$csrf" ]; then
              curl --silent --show-error --max-time 15 \
                --cookie "$cookie_jar" \
                --header "X-CSRF-Token: $csrf" \
                --request POST "$HEALTHCHECK_URL/logout" >/dev/null || true
            fi
            rm -f "$cookie_jar" /tmp/fastockflow-*.body /tmp/fastockflow-login.headers
          }
          trap cleanup EXIT

          login_status="$(curl --silent --show-error --retry 5 --retry-all-errors --max-time 15 \
            --cookie-jar "$cookie_jar" \
            --dump-header /tmp/fastockflow-login.headers \
            --output /tmp/fastockflow-login.body \
            --write-out '%{http_code}' \
            --request POST \
            --data-urlencode "email=$SMOKE_LOGIN_ID" \
            --data-urlencode "password=$SMOKE_PASSWORD" \
            --data-urlencode "company_id=$SMOKE_COMPANY_ID" \
            "$HEALTHCHECK_URL/login")"
          test "$login_status" = "303"
          grep -Eqi '^location: /dashboard/?\r?$' /tmp/fastockflow-login.headers
          grep -q 'fastock_session' "$cookie_jar"
          grep -q 'fastock_csrf' "$cookie_jar"

          dashboard_status="$(curl --silent --show-error --retry 5 --retry-all-errors --max-time 15 \
            --cookie "$cookie_jar" --output /tmp/fastockflow-dashboard.body \
            --write-out '%{http_code}' "$HEALTHCHECK_URL/dashboard")"
          test "$dashboard_status" = "200"
          grep -q '<title>Dashboard · FAstockFlow</title>' /tmp/fastockflow-dashboard.body

          report_status="$(curl --silent --show-error --retry 5 --retry-all-errors --max-time 15 \
            --cookie "$cookie_jar" --output /tmp/fastockflow-report.body \
            --write-out '%{http_code}' "$HEALTHCHECK_URL/reports/current-stock")"
          test "$report_status" = "200"
          grep -q 'Current Stock Report' /tmp/fastockflow-report.body

          storage_status="$(curl --silent --show-error --retry 5 --retry-all-errors --max-time 15 \
            --cookie "$cookie_jar" --output /tmp/fastockflow-storage.body \
            --write-out '%{http_code}' "$HEALTHCHECK_URL/files/status")"
          test "$storage_status" = "200"
          node -e "const r=JSON.parse(require('node:fs').readFileSync('/tmp/fastockflow-storage.body','utf8')); if(r.ok!==true||r.storage!==true) process.exit(1)"
