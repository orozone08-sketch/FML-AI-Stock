name: Cloudflare production deploy
on:
  workflow_call:
    secrets:
      CLOUDFLARE_ACCOUNT_ID: { required: true }
      CLOUDFLARE_API_TOKEN: { required: true }
      FASTOCKFLOW_D1_DATABASE_ID: { required: true }
      FASTOCKFLOW_WORKER_URL: { required: true }
      FASTOCKFLOW_SMOKE_LOGIN_ID: { required: true }
      FASTOCKFLOW_SMOKE_PASSWORD: { required: true }
      FASTOCKFLOW_SMOKE_COMPANY_ID: { required: true }
permissions:
  contents: read
concurrency:
  group: fastockflow-cloudflare-production
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: cloudflare-production
    defaults:
      run:
        working-directory: cloudflare
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      EXPECTED_D1_DATABASE_ID: ${{ secrets.FASTOCKFLOW_D1_DATABASE_ID }}
      HEALTHCHECK_URL: ${{ secrets.FASTOCKFLOW_WORKER_URL }}
      SMOKE_LOGIN_ID: ${{ secrets.FASTOCKFLOW_SMOKE_LOGIN_ID }}
      SMOKE_PASSWORD: ${{ secrets.FASTOCKFLOW_SMOKE_PASSWORD }}
      SMOKE_COMPANY_ID: ${{ secrets.FASTOCKFLOW_SMOKE_COMPANY_ID }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare/package-lock.json
      - run: npm ci
      - name: Verify exact tested commit and production resource identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.sha }}"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$EXPECTED_D1_DATABASE_ID"
          test "$EXPECTED_D1_DATABASE_ID" != '00000000-0000-0000-0000-000000000000'
          grep -q '"name": "fastockflow"' wrangler.jsonc
          grep -q '"database_name": "fastockflow-db"' wrangler.jsonc
          grep -q '"bucket_name": "fastockflow-files"' wrangler.jsonc
          EXPECTED_D1_DATABASE_ID="$EXPECTED_D1_DATABASE_ID" node - <<'NODE'
          const fs = require('node:fs');
          const config = JSON.parse(fs.readFileSync('wrangler.jsonc', 'utf8'));
          const binding = config.d1_databases?.find((entry) => entry.binding === 'DB');
          if (!binding || binding.database_name !== 'fastockflow-db' || binding.database_id !== process.env.EXPECTED_D1_DATABASE_ID) {
            console.error('wrangler.jsonc DB binding does not exactly match the protected production database identity.');
            process.exit(1);
          }
          NODE
          npx wrangler whoami
          npx wrangler d1 info fastockflow-db --json | tee /tmp/d1-info.json
          EXPECTED_D1_DATABASE_ID="$EXPECTED_D1_DATABASE_ID" node - <<'NODE'
          const fs = require('node:fs');
          const info = JSON.parse(fs.readFileSync('/tmp/d1-info.json', 'utf8'));
          const databases = Array.isArray(info) ? info : [info];
          if (!databases.some((db) => db.uuid === process.env.EXPECTED_D1_DATABASE_ID || db.database_id === process.env.EXPECTED_D1_DATABASE_ID)) {
            console.error('The remote D1 binding does not resolve to the protected database UUID.');
            process.exit(1);
          }
          NODE
      - run: npm run validate
      - name: Capture pre-deploy recovery evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p recovery
          npx wrangler d1 time-travel info fastockflow-db --json | tee recovery/d1-before.json
          npx wrangler deployments status --name fastockflow --json | tee recovery/worker-deployment-before.json
          DEPLOY_COMMIT="${{ github.sha }}" node - <<'NODE'
          const fs = require('node:fs');
          const d1 = JSON.parse(fs.readFileSync('recovery/d1-before.json', 'utf8'));
          const deployment = JSON.parse(fs.readFileSync('recovery/worker-deployment-before.json', 'utf8'));
          const bookmark = d1.bookmark;
          const traffic = Array.isArray(deployment.versions) ? deployment.versions : [];
          const previous = traffic.length === 1 && Number(traffic[0]?.percentage) === 100 ? traffic[0]?.version_id : undefined;
          if (typeof bookmark !== 'string' || !bookmark || typeof previous !== 'string' || !previous) {
            console.error('Could not derive an exact D1 bookmark and single 100% production Worker version.');
            process.exit(1);
          }
          const lines = [
            '# FAstockFlow deployment recovery evidence', '',
            `GitHub run: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            `Candidate commit: ${process.env.DEPLOY_COMMIT}`,
            `Previous Worker version: ${previous}`,
            `Pre-migration D1 bookmark: ${bookmark}`, '',
            'Freeze writes before either recovery command. Restore code first only when the schema remains compatible.', '',
            '```sh',
            `npx wrangler rollback ${previous} --name fastockflow --message "Rollback GitHub run ${process.env.GITHUB_RUN_ID}" --yes`,
            `npx wrangler d1 time-travel restore fastockflow-db --bookmark=${bookmark} --json`,
            '```', '',
            'D1 Time Travel does not restore R2 objects. Reconcile R2 separately from its inventory/backup before reopening writes.', ''
          ];
          fs.writeFileSync('recovery/RECOVERY.md', lines.join('\n'));
          NODE
      - name: Preserve recovery evidence
        uses: actions/upload-artifact@v4
        with:
          name: fastockflow-recovery-${{ github.run_id }}
          path: cloudflare/recovery/
          if-no-files-found: error
          retention-days: 30
      - name: Apply immutable migrations
        run: npx wrangler d1 migrations apply fastockflow-db --remote
      - name: Deploy tested Worker
        run: npx wrangler deploy --var "DEPLOY_COMMIT:${{ github.sha }}"
      - name: Public health and readiness checks
        shell: bash
        run: |
          set -euo pipefail
          test -n "$HEALTHCHECK_URL"
          expected_commit="${{ github.sha }}"
          deployed=false

          # Workers can briefly serve the previous version while a deployment
          # propagates. Poll until this exact validated commit reaches the edge.
          for attempt in $(seq 1 24); do
            if curl --silent --show-error --fail --max-time 15 \
                "$HEALTHCHECK_URL/healthz" \
                --output /tmp/fastockflow-health.json && \
              EXPECTED_COMMIT="$expected_commit" node -e '
                try {
                  const r = JSON.parse(require("node:fs").readFileSync("/tmp/fastockflow-health.json", "utf8"));
                  process.exit(r.ok === true && r.commit === process.env.EXPECTED_COMMIT ? 0 : 1);
                } catch {
                  process.exit(1);
                }
              '; then
              deployed=true
              break
            fi

            if [ "$attempt" -lt 24 ]; then
              sleep 5
            fi
          done

          if [ "$deployed" != true ]; then
            echo "Expected deployed commit $expected_commit, but health check never matched."
            test ! -f /tmp/fastockflow-health.json || cat /tmp/fastockflow-health.json
            exit 1
          fi

          cat /tmp/fastockflow-health.json
          curl --silent --show-error --fail --retry 5 --retry-all-errors \
            --max-time 15 "$HEALTHCHECK_URL/readyz"
      - name: Authenticated post-deploy acceptance checks
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SMOKE_LOGIN_ID"
          test -n "$SMOKE_PASSWORD"
          test -n "$SMOKE_COMPANY_ID"
          test "$SMOKE_COMPANY_ID" -gt 0

          cookie_jar="$(mktemp)"
          cleanup() {
            csrf="$(awk '$6 == "fastock_csrf" { print $7 }' "$cookie_jar" | tail -n 1)"
            if [ -n "$csrf" ]; then
              curl --silent --show-error --max-time 15 \
                --cookie "$cookie_jar" \
                --header "X-CSRF-Token: $csrf" \
                --request POST "$HEALTHCHECK_URL/logout" >/dev/null || true
            fi
            rm -f "$cookie_jar" /tmp/fastockflow-*.body /tmp/fastockflow-login.headers
          }
          trap cleanup EXIT

          curl --silent --show-error --fail --retry 5 --retry-all-errors --max-time 15 \
            --cookie-jar "$cookie_jar" \
            --output /tmp/fastockflow-login-form.body \
            "$HEALTHCHECK_URL/login/company/$SMOKE_COMPANY_ID"
          public_csrf="$(node -e '
            const html=require("node:fs").readFileSync("/tmp/fastockflow-login-form.body","utf8");
            const match=html.match(/name="csrf_token"\s+value="([^"]+)"/);
            if(!match) process.exit(1);
            process.stdout.write(match[1]);
          ')"
          test -n "$public_csrf"

          login_status="$(curl --silent --show-error --retry 5 --retry-all-errors --max-time 15 \
            --cookie "$cookie_jar" \
            --cookie-jar "$cookie_jar" \
            --dump-header /tmp/fastockflow-login.headers \
            --output /tmp/fastockflow-login.body \
            --write-out '%{http_code}' \
            --request POST \
            --data-urlencode "csrf_token=$public_csrf" \
            --data-urlencode "email=$SMOKE_LOGIN_ID" \
            --data-urlencode "password=$SMOKE_PASSWORD" \
            --data-urlencode "company_id=$SMOKE_COMPANY_ID" \
            "$HEALTHCHECK_URL/login")"
          login_location="$(awk 'tolower($1) == "location:" { print $2 }' /tmp/fastockflow-login.headers | tr -d '\r' | tail -n 1)"
          echo "Login status: $login_status"
          echo "Login redirect: $login_location"
          test "$login_status" = "303"
          test "$login_location" = "/dashboard/" || test "$login_location" = "/dashboard"
          grep -q 'fastock_session' "$cookie_jar"
          grep -q 'fastock_csrf' "$cookie_jar"

          dashboard_status="$(curl --silent --show-error --retry 5 --retry-all-errors --max-time 15 \
            --cookie "$cookie_jar" --output /tmp/fastockflow-dashboard.body \
            --write-out '%{http_code}' "$HEALTHCHECK_URL/dashboard")"
          echo "Dashboard status: $dashboard_status"
          test "$dashboard_status" = "200"
          if ! grep -q '<title>Dashboard · FAstockFlow</title>' /tmp/fastockflow-dashboard.body; then
            echo "Unexpected dashboard title: $(grep -o '<title>[^<]*</title>' /tmp/fastockflow-dashboard.body | head -n 1)"
            exit 1
          fi

          report_status="$(curl --silent --show-error --retry 5 --retry-all-errors --max-time 15 \
            --cookie "$cookie_jar" --output /tmp/fastockflow-report.body \
            --write-out '%{http_code}' "$HEALTHCHECK_URL/reports/current-stock")"
          echo "Current-stock report status: $report_status"
          test "$report_status" = "200"
          if ! grep -q 'Current Stock Report' /tmp/fastockflow-report.body; then
            echo "Current-stock report marker missing."
            exit 1
          fi

          storage_status="$(curl --silent --show-error --retry 5 --retry-all-errors --max-time 15 \
            --cookie "$cookie_jar" --output /tmp/fastockflow-storage.body \
            --write-out '%{http_code}' "$HEALTHCHECK_URL/files/status")"
          echo "R2 status endpoint: $storage_status"
          test "$storage_status" = "200"
          node -e "const r=JSON.parse(require('node:fs').readFileSync('/tmp/fastockflow-storage.body','utf8')); if(r.ok!==true||r.storage!==true) process.exit(1)"
