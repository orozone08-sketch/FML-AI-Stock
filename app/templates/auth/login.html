{% extends "base.html" %}
{% block title %}Company Login{% endblock %}
{% block public_content %}
  <main class="login-page">
    <form class="login-card" method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="login-brand">
        <div>
          <h1>Company Login</h1>
          <p>Select your company and enter its password.</p>
        </div>
      </div>
      <div class="login-company-options" role="radiogroup" aria-label="Company login">
        <label class="login-company-option">
          <input name="email" type="radio" value="firsttech.user" required autofocus>
          <img src="{{ url_for('static', filename='img/firsttech-logo.jpg', v=asset_version) }}" alt="FirstTech Machine LLP">
          <span>FirstTech Machine LLP</span>
          <small>Login ID: firsttech.user</small>
        </label>
        <label class="login-company-option">
          <input name="email" type="radio" value="adityainternational.user" required>
          <img src="{{ url_for('static', filename='img/aditya-logo.jpg', v=asset_version) }}" alt="Aditya International">
          <span>Aditya International</span>
          <small>Login ID: Adityainternational.user</small>
        </label>
      </div>
      <label>Password
        <span class="password-wrap">
          <input id="password" name="password" type="password" autocomplete="current-password" required>
          <button type="button" class="icon-button" data-toggle-password="#password">Show</button>
        </span>
      </label>
      <button class="primary-button full" type="submit">Login</button>
    </form>
  </main>
{% endblock %}
